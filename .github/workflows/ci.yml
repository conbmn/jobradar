name: tests

# Run the test suite on pushes to main and on every PR, so engine changes
# (incl. friends' tweaks) are checked before they land. No secrets needed —
# the suite is pure/offline (no scraping, no LLM, no Telegram/Notion).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
