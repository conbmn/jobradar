name: jobradar monitor

# Runs the steady-state pass (scrape → diff → match → alert) twice daily, and
# refreshes the Notion roles table. Config (config/matcher.yml) is committed in this
# private repo and read straight from the checkout — change config by editing the
# file and pushing, no secret to re-sync. Companies come from Notion. State
# (jobradar.db) is persisted between runs via actions/cache. See DESIGN §4.1, §8.
#
# Required repo secrets (Settings → Secrets and variables → Actions) — credentials only:
#   NOTION_TOKEN, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   (ANTHROPIC_API_KEY only if the LLM tier is enabled)

on:
  schedule:
    # GitHub's scheduler is best-effort: it delays scheduled runs by hours or
    # drops them entirely under load, and never back-fills a skipped run. This
    # single daily cron is a reliable-enough FALLBACK. For punctual runs at exact
    # times, point an external cron (e.g. the free cron-job.org) at this workflow's
    # workflow_dispatch endpoint — it fires within seconds, on time. Duplicate runs
    # are deduped by the DB (notified flag) and serialized by the concurrency group
    # below, so an overlap costs at most one extra scrape.
    - cron: "13 11 * * *"  # ~daily fallback (UTC, ignores DST); edit to taste
  workflow_dispatch: {}    # manual runs + the external-cron trigger entrypoint

# Avoid two runs racing on the same cached DB.
concurrency:
  group: jobradar-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state DB
        uses: actions/cache@v4
        with:
          path: jobradar.db
          # Unique key per run → save always succeeds; restore-keys pulls the
          # most recent prior DB so 'seen' state carries over between runs.
          key: jobradar-db-${{ github.run_id }}
          restore-keys: |
            jobradar-db-

      # config/matcher.yml is committed (private repo), so it's already in the checkout.

      - name: Run monitor
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m jobradar run
